[tool.poetry]
name = "compliance-sdk"
version = "1.3.2"
description = "Shared utilities for the compliance platform"
authors = ["Platform Team <platform@regulator.internal>"]

[tool.poetry.dependencies]
pydantic-settings = "^2.14"
python = "^3.12"
aiokafka = ">=0.14.0"
structlog = ">=26.1.0"
opentelemetry-api = ">=1.24"
opentelemetry-sdk = ">=1.42.1"
opentelemetry-exporter-otlp-proto-http = ">=1.42.1"
prometheus-client = ">=0.25.0"
pydantic = ">=2.13.4"
tenacity = ">=9.1.4"
redis = { version = ">=8.0.0", optional = true }

[tool.poetry.extras]
redis = ["redis"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
