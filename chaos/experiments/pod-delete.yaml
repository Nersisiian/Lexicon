apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: lexicon-chaos
  namespace: compliance
spec:
  appinfo:
    appns: compliance
    applabel: app=intake-gateway
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: CHAOS_INTERVAL
              value: "10"
            - name: FORCE
              value: "true"
