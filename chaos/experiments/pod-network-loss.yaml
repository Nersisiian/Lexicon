apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-network-loss
  namespace: compliance
spec:
  appinfo:
    appns: compliance
    applabel: app=ocr-pipeline
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-network-loss
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CHAOS_INTERVAL
              value: "30"
            - name: NETWORK_PACKET_LOSS_PERCENTAGE
              value: "50"
