name: PR Checks
on:
  pull_request:
    branches: [ main ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install poetry
      - run: |
          cd packages/compliance-sdk
          poetry install --with dev
          poetry run pytest
      - run: |
          for svc in services/*/; do
            echo "Testing $svc"
            cd $svc
            poetry install --with dev || true
            poetry run pytest || true
            cd -
          done
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test