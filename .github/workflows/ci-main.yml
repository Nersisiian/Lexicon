name: CI Main
on:
  push:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [intake-gateway, ocr-pipeline, document-classifier, compliance-engine, fraud-detection, reasoning-service, audit-ledger, review-workbench, notification-orchestrator]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building ${{ matrix.service }}"
          docker build --progress=plain \
            -t ${{ matrix.service }}:latest \
            -f services/${{ matrix.service }}/Dockerfile \
            . 2>&1 | tee build.log

      - name: Push image (placeholder)
        run: echo "Pushing to registry..."
