name: CI Main
on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [intake-gateway, ocr-pipeline, document-classifier, compliance-engine, fraud-detection, reasoning-service, audit-ledger, review-workbench, notification-orchestrator]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase image path
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PATH=${REGISTRY}/${OWNER}/${REPO}" >> $GITHUB_ENV
        env:
          REGISTRY: ${{ env.REGISTRY }}
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PATH }}/${{ matrix.service }}:${{ github.sha }}

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run intake-gateway and check health
        run: |
          docker run -d --name intake \
            -e KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e MINIO_ACCESS_KEY=minio \
            -e MINIO_SECRET_KEY=minio \
            -p 8000:8000 \
            ghcr.io/nersisiian/lexicon/intake-gateway:${{ github.sha }}
          for i in {1..30}; do
            if curl -s -f -o /dev/null http://localhost:8000/health; then
              echo "intake-gateway healthy"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: intake-gateway did not start"
          docker logs intake
          exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f intake || true

  integration-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Start test environment
        run: |
          export GITHUB_SHA=${{ github.sha }}
          docker compose -f deploy/docker-compose/docker-compose.test.yml up -d
      - name: Wait for Kafka
        run: |
          for i in {1..60}; do
            if docker compose -f deploy/docker-compose/docker-compose.test.yml exec -T kafka kafka-broker-api-versions --bootstrap-server localhost:9092 &>/dev/null; then
              echo "Kafka ready"
              break
            fi
            sleep 2
          done
      - name: Wait for intake-gateway healthcheck
        run: |
          for i in {1..30}; do
            if curl -s -f -o /dev/null http://localhost:8000/health; then
              echo "intake-gateway healthy"
              break
            fi
            sleep 2
          done
      - name: Upload document and verify Kafka message
        run: |
          echo "Test PDF" > /tmp/sample.pdf
          RESP=$(curl -s -X POST http://localhost:8000/v2/documents \
            -F "file=@/tmp/sample.pdf;type=application/pdf")
          echo "Response: $RESP"
          if echo "$RESP" | grep -q 'Internal Server Error'; then
            echo "=== intake-gateway logs ==="
            docker compose -f deploy/docker-compose/docker-compose.test.yml logs intake-gateway
            exit 1
          fi
          DOC_ID=$(echo "$RESP" | jq -r '.document_id')
          echo "Document ID: $DOC_ID"
          sleep 10
          docker compose -f deploy/docker-compose/docker-compose.test.yml exec -T kafka \
            kafka-console-consumer --topic document.ingested --bootstrap-server localhost:9092 \
            --timeout-ms 15000 | grep "$DOC_ID"
      - name: Cleanup
        if: always()
        run: docker compose -f deploy/docker-compose/docker-compose.test.yml down -v
