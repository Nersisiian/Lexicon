global:
  environment: production
  imageRegistry: ghcr.io
  imageOwner: nersisiian
  imageRepo: lexicon
  kafkaBootstrapServers: kafka:9092

intake-gateway:
  enabled: true
  replicas: 2
  image: intake-gateway
  tag: stable
  databaseUrl: postgresql://compliance:CHANGE_ME@postgres:5432/intake
  redisUrl: redis://redis:6379
  minio:
    endpoint: minio:9000
    accessKey: minioadmin
    secretKey: minioadmin
  service:
    port: 8000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

# Остальные сервисы аналогично, опустим для краткости
# В реальности нужно заполнить все
