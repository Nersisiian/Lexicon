apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intake-gateway
  template:
    metadata:
      labels:
        app: intake-gateway
    spec:
      containers:
        - name: intake-gateway
          image: nginx:alpine
          ports:
            - containerPort: 80

