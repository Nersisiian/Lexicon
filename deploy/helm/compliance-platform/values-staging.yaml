# Staging environment overrides.
# Staging mirrors production as closely as possible except for reduced replicas,
# smaller PVC sizes, and relaxed resource limits to save cost.
global:
  environment: staging
  imageRegistry: staging-registry.azurecr.io
  kafkaBootstrapServers: kafka-staging:9092

intake-gateway:
  replicas: 2
  tag: staging-latest
  databaseUrl: postgresql+asyncpg://compliance:password@postgres-staging:5432/intake
  redisUrl: redis://redis-staging:6379
  minio:
    endpoint: minio-staging:9000
    accessKey: staging-minio-user
    secretKey: staging-minio-pass
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

ocr-pipeline:
  enabled: true
  replicas: 2
  tag: staging-latest
  env:
    OCR_BACKEND: paddle
    MAX_PAGES_PER_DOC: 15
    PROCESSING_TIMEOUT: 25
  resources:
    limits:
      cpu: 1000m
      memory: 1.5Gi
    requests:
      cpu: 500m
      memory: 512Mi

document-classifier:
  enabled: true
  replicas: 1
  tag: staging-latest
  env:
    MODEL_NAME: finreg-bert-classifier-staging
    DEVICE: cpu
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

compliance-engine:
  enabled: true
  replicas: 2
  tag: staging-latest
  env:
    SANCTIONS_API_URL: http://sanctions-api-staging:8080/search
  resources:
    limits:
      cpu: 300m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

fraud-detection:
  enabled: true
  replicas: 1
  tag: staging-latest
  env:
    MODEL_PATH: /models/fraud_ensemble_staging.pkl

reasoning-service:
  enabled: true
  replicas: 1
  tag: staging-latest
  env:
    LLM_ENDPOINT: http://llm-staging:8080/v1/completions

audit-ledger:
  enabled: true
  replicas: 2
  tag: staging-latest
  databaseUrl: postgresql+asyncpg://compliance:password@postgres-staging:5432/audit
  service:
    port: 8000

review-workbench:
  enabled: true
  replicas: 2
  tag: staging-latest
  databaseUrl: postgresql+asyncpg://compliance:password@postgres-staging:5432/review
  service:
    port: 8000

notification-orchestrator:
  enabled: true
  replicas: 1
  tag: staging-latest
  env:
    SLACK_WEBHOOK_URL: https://hooks.slack.com/services/staging-placeholder
