apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ocr-pipeline-scaler
  namespace: compliance
spec:
  scaleTargetRef:
    name: ocr-pipeline
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: ocr-pipeline-v1
        topic: document.uploaded
        lagThreshold: "100"
