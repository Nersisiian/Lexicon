apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: document-classifier-scaler
  namespace: compliance
spec:
  scaleTargetRef:
    name: document-classifier
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: document-classifier-v1
        topic: document.classified
        lagThreshold: "100"
