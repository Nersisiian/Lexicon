services:
  # ---------- инфраструктура ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: staging
      POSTGRES_PASSWORD: staging_pass
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
  redis:
    image: redis:7
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/raw-documents;
      exit 0;
      "

  # ---------- сервисы ----------
  intake-gateway:
    image: ghcr.io/nersisiian/lexicon/intake-gateway:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://staging:staging_pass@postgres:5432/intake
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DEPLOY_ENV: staging
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ocr-pipeline:
    image: ghcr.io/nersisiian/lexicon/ocr-pipeline:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OCR_BACKEND: paddle
      DEPLOY_ENV: staging
    depends_on:
      - kafka

  document-classifier:
    image: ghcr.io/nersisiian/lexicon/document-classifier:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEPLOY_ENV: staging
    depends_on:
      - kafka

  compliance-engine:
    image: ghcr.io/nersisiian/lexicon/compliance-engine:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SANCTIONS_API_URL: http://sanctions-staging:8080/search
      DEPLOY_ENV: staging
    depends_on:
      - kafka

  fraud-detection:
    image: ghcr.io/nersisiian/lexicon/fraud-detection:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEPLOY_ENV: staging
    depends_on:
      - kafka

  reasoning-service:
    image: ghcr.io/nersisiian/lexicon/reasoning-service:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LLM_ENDPOINT: http://llm-staging:8080/v1/completions
      DEPLOY_ENV: staging
    depends_on:
      - kafka

  audit-ledger:
    image: ghcr.io/nersisiian/lexicon/audit-ledger:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://staging:staging_pass@postgres:5432/audit
      DEPLOY_ENV: staging
    ports:
      - "8001:8000"
    depends_on:
      - kafka
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  review-workbench:
    image: ghcr.io/nersisiian/lexicon/review-workbench:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://staging:staging_pass@postgres:5432/review
      DEPLOY_ENV: staging
    ports:
      - "8002:8000"
    depends_on:
      - kafka
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-orchestrator:
    image: ghcr.io/nersisiian/lexicon/notification-orchestrator:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SLACK_WEBHOOK_URL: http://slack-staging
      DEPLOY_ENV: staging
    depends_on:
      - kafka



