services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    volumes:
      - ../../deploy/docker-compose/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/raw-documents;
      exit 0;
      "
  notification-orchestrator:
    image: ghcr.io/nersisiian/lexicon/notification-orchestrator:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SLACK_WEBHOOK_URL: http://host.docker.internal:8080/slack
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  mlflow:
    image: python:3.12-slim
    command: >
      sh -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db"
    ports:
      - "5000:5000"

  analytics-engine:
    build:
      context: ../../services/analytics-engine
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://test:test@postgres:5432/test
    depends_on:
      - postgres

  external-gateway:
    build:
      context: ../../services/external-gateway
      dockerfile: Dockerfile
    ports:
      - "8004:8004"

  predictive-maintenance:
    build:
      context: ../../services/predictive-maintenance
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
  intake-gateway:
    image: ghcr.io/nersisiian/lexicon/intake-gateway:${GITHUB_SHA:-latest}
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://test:test@postgres:5432/test
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      REGULATOR_ID: test-regulator
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis
      - minio
  frontend:
    build:
      context: ../../services/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - intake-gateway
