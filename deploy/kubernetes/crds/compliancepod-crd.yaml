apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: compliancepods.lexicon.dev
spec:
  group: lexicon.dev
  names:
    kind: CompliancePod
    listKind: CompliancePodList
    plural: compliancepods
    singular: compliancepod
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
