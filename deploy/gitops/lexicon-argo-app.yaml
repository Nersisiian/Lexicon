apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lexicon
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nersisiian/Lexicon.git
    targetRevision: main
    path: deploy/helm/compliance-platform
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: compliance
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
