global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'platform-services'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: intake-gateway|ocr-pipeline|compliance-engine|audit-ledger|review-workbench|fraud-detection|reasoning-service|notification-orchestrator|document-classifier
  - job_name: 'opentelemetry-collector'
    static_configs:
      - targets: ['otel-collector:8889']
