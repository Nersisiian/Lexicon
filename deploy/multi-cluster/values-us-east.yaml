global:
  cluster: us-east
  domain: east.lexicon.internal
  imageTag: latest

postgres:
  primary:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: topology.kubernetes.io/region
              operator: In
              values: ["us-east-1"]

kafka:
  externalAccess:
    enabled: true
    service:
      domain: kafka.east.lexicon.internal
