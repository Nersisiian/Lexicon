global:
  cluster: eu-west
  domain: west.lexicon.internal
  imageTag: latest

postgres:
  primary:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: topology.kubernetes.io/region
              operator: In
              values: ["eu-west-1"]

kafka:
  externalAccess:
    enabled: true
    service:
      domain: kafka.west.lexicon.internal
