apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: lexicon-gateway
  namespace: compliance
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "api.lexicon.internal"
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
