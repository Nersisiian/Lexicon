apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: intake-gateway-route
  namespace: compliance
spec:
  parentRefs:
    - name: lexicon-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: intake-gateway-us-east
          port: 8000
          weight: 80
        - name: intake-gateway-eu-west
          port: 8000
          weight: 20
