apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: intake-gateway
  namespace: compliance
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 100
  selector:
    matchLabels:
      app: intake-gateway
  template:
    metadata:
      labels:
        app: intake-gateway
    spec:
      containers:
        - name: intake-gateway
          image: ghcr.io/nersisiian/lexicon/intake-gateway:latest
          ports:
            - containerPort: 8000
